version: '3.9'
services:
  postgres:
    image: postgres:15
    container_name: crm_sign_medios_postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: devuser
      POSTGRES_PASSWORD: devpass
      POSTGRES_DB: crm_sign_medios
    ports:
      - '5432:5432'
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U devuser"]
      interval: 10s
      timeout: 5s
      retries: 5
volumes:
  postgres_data:
    name: crm_sign_medios_postgres_data
